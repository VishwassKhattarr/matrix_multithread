<!DOCTYPE html>
<html>
<head>
    <title>Matrix Multithreading</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; }

        #loader {
            display: none;
            font-weight: bold;
            color: blue;
        }

        #progress {
            margin-top: 10px;
            font-weight: bold;
        }

        button:disabled {
            background: gray;
        }
    </style>
</head>
<body>

<h2>Matrix Multiplication (Multithreading)</h2>

<label>Matrix Size:</label>
<input type="number" id="size" value="200"><br><br>

<label>Number of Multiplications:</label>
<input type="number" id="tasks" value="20"><br><br>

<button id="runBtn" onclick="run()">Run Experiment</button>

<p id="loader">Processing... Please wait ⏳</p>
<p id="progress"></p>

<h3>Results</h3>
<table border="1" id="table"></table>

<canvas id="chart"></canvas>

<script>
let chart;

async function run() {
    const size = document.getElementById("size").value;
    const totalTasks = document.getElementById("tasks").value;

    const btn = document.getElementById("runBtn");
    const loader = document.getElementById("loader");
    const progress = document.getElementById("progress");

    // UI changes
    btn.disabled = true;
    loader.style.display = "block";
    progress.innerText = "Starting...";

    const results = [];

    // simulate progress per thread
    for (let t = 1; t <= 8; t++) {
        progress.innerText = `Running with ${t} threads...`;

        const res = await fetch('/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ size: Number(size), totalTasks: Number(totalTasks) })
        });

        const data = await res.json();
        results.push(data[t-1]); // take corresponding thread result
    }

    loader.style.display = "none";
    progress.innerText = "Completed";

    const threads = results.map(d => d.threads);
    const times = results.map(d => d.time);

    // Table
    let html = "<tr><th>Threads</th><th>Time (sec)</th></tr>";
    results.forEach(d => {
        html += `<tr><td>${d.threads}</td><td>${d.time}</td></tr>`;
    });
    document.getElementById("table").innerHTML = html;

    // Graph
    if (chart) chart.destroy();

    chart = new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
            labels: threads,
            datasets: [{
                label: 'Execution Time',
                data: times
            }]
        }
    });

    btn.disabled = false;
}
</script>

</body>
</html>
